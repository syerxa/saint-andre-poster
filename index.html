<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Saint-André and Drummond Fire Departments</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; }
    .poster {
      position: relative;
      max-width: 800px;
      margin: 0 auto;
      line-height: 0;
    }
    .poster img { width: 100%; height: auto; display: block; }

    /* mailto hitbox over the CONTACT US TODAY bar + email address (bottom-left) */
    .email-link {
      position: absolute;
      left: 0;
      top: 83.8%;
      width: 46.4%;
      height: 9.1%;
    }

    /* clickable hitbox over the JOIN TODAY button (bottom-left corner) */
    .moreinfo-link {
      position: absolute;
      left: 4.8%;
      top: 95.8%;
      width: 36.3%;
      height: 3.7%;
    }
  </style>
</head>
<body>
  <div class="poster">
    <img src="poster.jpg" alt="Why join the Saint-André and Drummond Fire Departments? Email ycaron@nb.sympatico.ca or click Join Today for more information.">

    <!-- CONTACT US TODAY / email -->
    <a class="email-link"
       href="mailto:ycaron@nb.sympatico.ca?subject=Interested%20in%20Joining%20the%20Saint-Andr%C3%A9%20and%20Drummond%20Fire%20Departments"
       aria-label="Email the Saint-André and Drummond Fire Departments to join"></a>

    <!-- JOIN TODAY → info doc  (doc must be shared "Anyone with the link" or this 404s for visitors) -->
    <a class="moreinfo-link"
       href="https://docs.google.com/document/d/1ahpYGPSN_sQNv4SapQSOcx6VhpHOZehwKi-IN8h2_5g"
       target="_blank" rel="noopener"
       aria-label="More information about joining (opens document)"></a>
  </div>
</body>
</html>
